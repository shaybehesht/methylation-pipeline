[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "methyl-trio"
version = "0.1.0"
description = "Offline three-sample nanopore methylation DMR analysis"
requires-python = ">=3.11"
dependencies = [
  "jinja2>=3.1",
  "matplotlib>=3.9",
  "numpy>=2.0",
  "pandas>=2.2",
  "pysam>=0.22",
  "scipy>=1.14",
  "streamlit>=1.37",
]

[project.optional-dependencies]
test = ["pytest>=8.3"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
