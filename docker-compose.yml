services:
  methyl-trio:
    build: .
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - "${METHYL_TRIO_DATA:-./data}:/data:ro"
      - "./runs:/app/runs"
      - "methyl-trio-references:/references"
    environment:
      METHYL_TRIO_DATA_ROOT: /data
      METHYL_TRIO_REFERENCE_CACHE: /references
    restart: unless-stopped

volumes:
  methyl-trio-references:
