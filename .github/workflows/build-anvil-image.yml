name: Build and push MANGO AnVIL app image (GHCR)

# Builds the interactive MANGO app image (anvil/Dockerfile: Streamlit app +
# Jupyter/jupyter-server-proxy + modkit/samtools + gcloud) and pushes it to
# GitHub Container Registry. Use this image for a Terra custom Cloud Environment.
# After the first run, make the package public so Terra can pull it:
#   GitHub -> Packages -> mango-anvil -> Package settings -> Public.

on:
  push:
    branches:
      - main
      - cursor/anvil-gcs-integration-06d8
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free extra disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL || true
          docker image prune -af || true
          df -h

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mango-anvil" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./anvil/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Summary
        run: |
          echo "Pushed ${{ steps.image.outputs.name }}:latest" >> "$GITHUB_STEP_SUMMARY"
