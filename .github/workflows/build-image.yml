name: Build and push MANGO image

# Builds the MANGO analysis image (wdl/Dockerfile: mango-run + modkit + samtools)
# and pushes it to registries usable by Terra/Cromwell.
#
# Terra's Cromwell does NOT support ghcr.io for WDL execution, so the image is
# also pushed to Docker Hub (docker.io), which Terra supports. Add two repo
# secrets to enable the Docker Hub push:
#   DOCKERHUB_USERNAME  - your Docker Hub username
#   DOCKERHUB_TOKEN     - a Docker Hub access token (read/write)
# Then set the WDL input:
#   "mango_trio.docker": "docker.io/<DOCKERHUB_USERNAME>/mango:latest"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Free extra disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL || true
          docker image prune -af || true
          df -h

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute image tags
        id: names
        run: |
          GHCR="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mango"
          TAGS="$GHCR:latest"$'\n'"$GHCR:${GITHUB_SHA}"
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            DH="docker.io/${DOCKERHUB_USERNAME}/mango"
            TAGS="$TAGS"$'\n'"$DH:latest"$'\n'"$DH:${GITHUB_SHA}"
          fi
          { echo "tags<<EOF"; echo "$TAGS"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          echo "Will push:"; echo "$TAGS"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./wdl/Dockerfile
          push: true
          tags: ${{ steps.names.outputs.tags }}

      - name: Summary
        run: |
          echo "Pushed tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.names.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "NOTE: Docker Hub secrets not set — only GHCR was pushed (GHCR is NOT usable by Terra/Cromwell)." >> "$GITHUB_STEP_SUMMARY"
          fi
