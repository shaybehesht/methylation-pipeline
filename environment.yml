name: methyl-trio
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.11
  # Bioconda publishes modkit as "ont-modkit" (provides the `modkit` binary and
  # includes an osx-arm64/Apple Silicon build).
  - ont-modkit
  - samtools
  - htslib
  - methylartist
  - pip
  - pip:
      # modbamtools is not a conda package on the configured channels; install it
      # from PyPI so the environment solves on linux-64 as well as osx-arm64.
      - modbamtools
      - -e .
