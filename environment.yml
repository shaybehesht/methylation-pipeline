name: methyl-trio
channels:
  - conda-forge
  - bioconda
dependencies:
  # Pin a stable Python: the very latest (3.14) lacks prebuilt wheels for some
  # compiled deps, forcing source builds (e.g. cryptography -> Rust/OpenSSL).
  - python=3.12
  # Bioconda publishes modkit as "ont-modkit" (provides the `modkit` binary).
  - ont-modkit
  - samtools
  - htslib
  # Provide the compiled Python deps as conda binaries so pip never builds them
  # from source (cryptography needs Rust/OpenSSL; pysam needs htslib).
  - pysam
  - cryptography
  - pip
  - pip:
      - -e .
# Note: the app only shells out to `modkit` (and optionally `samtools faidx`,
# with a pysam fallback); tabix/bgzip are handled by pysam. methylartist and
# modbamtools were removed because MANGO does not call them and their dependency
# bx-python has no Apple Silicon build, which broke conda solves on macOS arm64.
