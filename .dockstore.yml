version: 1.2
# Registered on Dockstore via the Dockstore GitHub App (reads this file per branch/tag).
# AnVIL users should pick mango_ont (MANGO-ONT) or mango_pacbio (MANGO-PACBIO).
#
# filters: only sync main + version tags so feature branches (cursor/...) do not
# appear as Dockstore / Terra workflow versions.
workflows:
  - name: mango_ont
    subclass: WDL
    primaryDescriptorPath: /wdl/mango_ont.wdl
    testParameterFiles:
      - /wdl/inputs.ont.template.json
    readMePath: /wdl/README.md
    authors:
      - name: MANGO
    filters:
      branches:
        - main
      tags:
        - "v*"
  - name: mango_pacbio
    subclass: WDL
    primaryDescriptorPath: /wdl/mango_pacbio.wdl
    testParameterFiles:
      - /wdl/inputs.pacbio.template.json
    readMePath: /wdl/README.md
    authors:
      - name: MANGO
    filters:
      branches:
        - main
      tags:
        - "v*"
  - name: mango_trio
    subclass: WDL
    primaryDescriptorPath: /wdl/mango_trio.wdl
    testParameterFiles:
      - /wdl/inputs.template.json
    readMePath: /wdl/README.md
    authors:
      - name: MANGO
    filters:
      branches:
        - main
      tags:
        - "v*"
